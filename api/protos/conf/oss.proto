syntax = "proto3";

package conf;

// 对象存储
message OSS {

  // FTP
  message Ftp {
    // ftp服务地址 例：127.0.0.1:21
    string endpoint = 1;
    // 登录ftp账号
    string userName = 2;
    // 登录ftp密码
    string userPwd = 3;
  }

  // 阿里云
  message Aliyun {
    // OSS服务器的访问地址，这个地址一般分为好几种，最好理解的就是它可以分为内网和外网，我们在选择时候一般选择外网
    string endpoint = 1;
    // accessKeyId对应的值，一般是做访问权限用的
    string accessKeyId = 2;
    // 加密的，不做解释，一般是考虑考虑安全问题
    string accessKeySecret = 3;
    // 创建的bucket存储空间的名称
    string bucketName = 4;
  }

  // MinIO
  message MinIO {
    string endpoint = 1;  // 对端端口
    string access_key = 2;  // 访问密钥
    string secret_key = 3;  // 密钥
    string token = 4; // 令牌
    // 创建的bucket存储空间的名称
    string bucketName = 5;

    bool use_ssl = 10; // 使用SSL
  }

  string type = 1;

  // 存储空间根目录
  string rootDirectory = 2;

  optional Aliyun aliyun = 3;//阿里云
  optional Ftp ftp = 4;//FTP
  optional MinIO minio = 5;
}
